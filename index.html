<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/orin-mark.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="ORIN — Origin-Verified RIN Marketplace. Browse Renewable Identification Number lots backed by ORIN Integrity Audits."
    />
    <meta name="theme-color" content="#02030a" />
    <title>ORIN · Origin-Verified RIN Marketplace</title>
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
      crossorigin
    />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <form name="contact" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" /><input type="email" name="email" /><input type="text" name="company" /><input type="text" name="role" /><input type="text" name="topic" /><textarea name="message"></textarea>
    </form>
    <form name="support" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" /><input type="email" name="email" /><input type="text" name="subject" /><input type="text" name="lotId" /><input type="text" name="severity" /><textarea name="description"></textarea>
    </form>
    <form name="listing" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" /><input type="email" name="email" /><input type="text" name="company" /><input type="text" name="facility" /><input type="text" name="dCode" /><input type="text" name="type" /><input type="number" name="quantity" /><input type="number" name="vintage" /><input type="number" name="price" /><input type="text" name="qapProvider" /><input type="text" name="qapStatus" /><input type="number" name="lat" /><input type="number" name="lng" /><input type="text" name="city" /><textarea name="notes"></textarea>
    </form>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
