<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <radialGradient id="iris" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22e0ff"/>
      <stop offset="55%" stop-color="#6cd4ff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#1a4566" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22e0ff"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="blade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0f24"/>
      <stop offset="1" stop-color="#02030a"/>
    </linearGradient>
  </defs>
  <!-- Outer body -->
  <circle cx="32" cy="32" r="29" stroke="url(#ring)" stroke-width="2" fill="#02030a"/>
  <circle cx="32" cy="32" r="25.5" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <!-- Aperture blades -->
  <g transform="translate(32 32)">
    <g fill="url(#blade)" stroke="url(#ring)" stroke-width="1" stroke-linejoin="round">
      <path d="M 0 -22 L 19 -10 L 0 0 Z" transform="rotate(0)"/>
      <path d="M 0 -22 L 19 -10 L 0 0 Z" transform="rotate(60)"/>
      <path d="M 0 -22 L 19 -10 L 0 0 Z" transform="rotate(120)"/>
      <path d="M 0 -22 L 19 -10 L 0 0 Z" transform="rotate(180)"/>
      <path d="M 0 -22 L 19 -10 L 0 0 Z" transform="rotate(240)"/>
      <path d="M 0 -22 L 19 -10 L 0 0 Z" transform="rotate(300)"/>
    </g>
  </g>
  <!-- Iris glow -->
  <circle cx="32" cy="32" r="9" fill="url(#iris)"/>
  <!-- Pupil -->
  <circle cx="32" cy="32" r="3.5" fill="#22e0ff"/>
  <!-- Catch-light highlight -->
  <circle cx="29.5" cy="29.5" r="1.2" fill="#ffffff" opacity="0.85"/>
  <!-- Reticle ticks -->
  <g stroke="rgba(34,224,255,0.35)" stroke-width="1" stroke-linecap="round">
    <line x1="32" y1="3" x2="32" y2="7"/>
    <line x1="32" y1="57" x2="32" y2="61"/>
    <line x1="3" y1="32" x2="7" y2="32"/>
    <line x1="57" y1="32" x2="61" y2="32"/>
  </g>
</svg>
